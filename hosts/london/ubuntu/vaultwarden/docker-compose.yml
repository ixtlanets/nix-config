services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - ./vaultwarden.env
    environment:
      DOMAIN: https://vault.nikcode.xyz
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: "80"
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./vw-data:/data
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2.11.4
    container_name: vaultwarden-caddy
    restart: unless-stopped
    depends_on:
      vaultwarden:
        condition: service_healthy
    ports:
      - "10.0.0.72:80:80"
      - "10.0.0.72:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-config:/config
      - ./caddy-data:/data

networks:
  default:
    name: vaultwarden_default
